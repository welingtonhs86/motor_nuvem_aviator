name: Sniper Aviator (Extração a cada 10 min)

on:
  schedule:
    - cron: '*/10 * * * *' # ⏰ O relógio invisível: Corre a cada 10 minutos
  workflow_dispatch: # 🔘 Permite-lhe clicar num botão para rodar manualmente se quiser testar

jobs:
  extrair_dados:
    runs-on: ubuntu-latest # Cria um computador virtual Linux da Microsoft na hora

    steps:
    - name: 📂 Clonar o Código
      uses: actions/checkout@v3

    - name: 🐍 Armar o Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 📦 Carregar Suprimentos (Requirements)
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🎯 Disparar o Sniper (motor_nuvem.py)
      run: |
        python motor_nuvem.py
